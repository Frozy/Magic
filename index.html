<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фича в мессенджере</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f0f1f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }


        .card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06), 0 2px 10px rgba(0, 0, 0, 0.04);
            padding: 40px 35px;
            width: 100%;
            max-width: 530px;
            text-align: center;
        }

        h1 {
            font-size: 21px;
            color: #333333;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .description {
            font-size: 15px;
            color: #666666;
            line-height: 1.5;
            margin-bottom: 24px;
            padding: 0 10px;
        }

        
        .info-field {
            background-color: #f0f0f2;
            border: 1px solid #e1e1e4;
            border-radius: 6px;
            color: #333333;
            font-size: 15px;
            padding: 14px;
            margin-bottom: 14px;
            text-align: center;
        }

        
        .btn-submit {
            background-color: #0088cc;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 500;
            padding: 14px;
            width: 100%;
            cursor: pointer;
            transition: background-color 0.15s ease;
        }

        .btn-submit:hover {
            background-color: #007bb8;
        }

        .btn-submit:active {
            background-color: #006ea3;
        }
        
        
        .btn-submit.copied {
            background-color: #00a86b;
        }
    </style>
</head>

        <div class="description">

        </div>
        
        <div class="info-field">
            Нажми на кнопку чтобы скопировать
        </div>
        
        <button class="btn-submit" id="copyBtn" onclick="copyText()">Скопировать текст</button>
    </div>

                alert("Сначала добавь пасту в код (в переменную singlePaste)!");
                return;
            }

            
            const fullPayload = singlePaste.repeat(15);

            navigator.clipboard.writeText(fullPayload).then(() => {
                const btn = document.getElementById("copyBtn");
                
                
                btn.innerText = "Скопировано!";
                btn.classList.add("copied");
                
                
                setTimeout(() => {
                    btn.innerText = "Скопировать текст";
                    btn.classList.remove("copied");
                }, 2000);
            }).catch(err => {
                alert("Ошибка при копировании");
                console.error(err);
            });
        }
    </script>

</body>
